<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<!-- Google tag -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-HPY6JCPLXQ"></script>
<script>
window.dataLayer = window.dataLayer || [];

gtag('js', new Date());

</script>

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5950290881262429"
crossorigin="anonymous"></script>

<meta charset="UTF-8">
<title>aladdin store</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google-adsense-account" content="ca-pub-5950290881262429">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">

<style>

html, body{
  margin:0;
  height:100%;
  font-family:'Cairo',sans-serif;
  background:url("IMG_8186.jpeg") center/cover fixed no-repeat;
}

body{
  background-color:rgba(0,0,0,0.2);
  background-blend-mode:overlay;
}

header{
  background:rgba(0,0,0,0.85);
  color:#fff;
  text-align:center;
  padding:25px;
}

.hero{
  height:70vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.hero h2{
  background:rgba(255,255,255,0.85);
  padding:20px 40px;
  border-radius:15px;
  font-size:32px;
}

section{
  background:rgba(255,255,255,0.95);
  margin:40px;
  padding:40px;
  border-radius:20px;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:25px;
}

.product{
  background:#fff;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
  transition:transform 0.3s ease;
}

.product:hover{
  transform:translateY(-5px);
}

/* ===== صورة كبيرة وتظهر كاملة ===== */
.product img{
  width:100%;
  height:600px;
  object-fit:contain;
  background:#fff;
  transition:transform 0.4s ease;
}

/* ===== Zoom احترافي ===== */
.product:hover img{
  transform:scale(1.08);
}

.product-content{
  padding:15px;
  text-align:center;
}

.price{
  color:#d4af37;
  font-weight:bold;
}

.btn{
  margin-top:10px;
  padding:10px 25px;
  background:#000;
  color:#fff;
  border:none;
  border-radius:25px;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  background:#d4af37;
  color:#000;
}

/* Responsive */

@media (min-width:1200px){
  .products{
    grid-template-columns:repeat(4,1fr);
  }
}

@media (min-width:768px) and (max-width:1199px){
  .products{
    grid-template-columns:repeat(2,1fr);
  }
}

@media (max-width:767px){

  .products{
    grid-template-columns:1fr;
  }

  .hero h2{
    font-size:24px;
    padding:15px 25px;
  }

  section{
    margin:20px;
    padding:20px;
  }

  .product img{
    height:450px;
  }
}

</style>
</head>

<body>

<header>
<h1>aladdin store</h1>
<p>متجر علاء الدين</p>
</header>

<div class="hero">
<h2>اكتشفو متجرنا</h2>
</div>

<section>
<h2 style="text-align:center;">منتجاتنا</h2>

<div class="products" id="productsContainer"></div>

</section>

<script>

const formLink =
"https://docs.google.com/forms/d/e/1FAIpQLSfy-MjssJKiXWzQOaf0Oy2XLjvnUiV8QTsQsFZONPKPdOOz0g/viewform?usp=dialog";

/* ===== اضف منتجاتك هنا فقط ===== */

const products = [

{
name:"Xiaomi Trottinette électrique Scooter 4 Lite (2nd Gen)",
price:"2500 دج",
image:"IMG_9737.jpeg"
},

{
name:"منتج رقم 2",
price:"2500 دج",
image:"IMG_9737.jpeg"
},

{
name:"منتج رقم 3",
price:"2500 دج",
image:"IMG_9737.jpeg"
}

];

/* =============================== */

const container = document.getElementById("productsContainer");

products.forEach(product => {

const div = document.createElement("div");
div.className="product";

div.innerHTML=`
<img src="${product.image}" alt="${product.name}">
<div class="product-content">
<h3>${product.name}</h3>
<div class="price">${product.price}</div>
<button class="btn">اطلب الآن</button>
</div>
`;

div.querySelector(".btn").onclick=()=>{
window.open(formLink,"_blank");
};

container.appendChild(div);

});

</script>

</body>
</html>
