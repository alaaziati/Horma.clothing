<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<!-- Google tag -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-HPY6JCPLXQ"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-HPY6JCPLXQ');
</script>

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5950290881262429"
crossorigin="anonymous"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>aladdin store</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* ===== أساس ===== */

body{
margin:0;
font-family:'Cairo',sans-serif;
background:#0f0f0f;
color:#fff;
}

/* ===== Navbar ===== */

nav{
position:sticky;
top:0;
background:rgba(0,0,0,0.9);
backdrop-filter:blur(10px);
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
z-index:1000;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
font-size:22px;
font-weight:700;
color:#c9a227;
}

.nav-links a{
color:#fff;
margin:0 15px;
text-decoration:none;
transition:0.3s;
}

.nav-links a:hover{
color:#c9a227;
}

/* ===== Hero ===== */

.hero{
height:80vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.9)),
url("IMG_8186.jpeg") center/cover no-repeat;
}

.hero h1{
font-size:48px;
margin-bottom:10px;
}

.hero p{
color:#ccc;
margin-bottom:25px;
}

.hero button{
padding:14px 35px;
border:none;
border-radius:30px;
background:#c9a227;
color:#000;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.hero button:hover{
transform:scale(1.05);
}

/* ===== Section ===== */

section{
padding:60px 8%;
background:#111;
}

.section-title{
text-align:center;
font-size:32px;
margin-bottom:40px;
}

/* ===== Products ===== */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.product{
background:#181818;
border-radius:18px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
transition:0.35s;
}

.product:hover{
transform:translateY(-10px);
box-shadow:0 20px 50px rgba(0,0,0,0.7);
}

/* الصور لم تتغير */
.product img{
width:100%;
height:600px;
object-fit:contain;
background:#fff;
transition:transform .4s ease;
}

.product:hover img{
transform:scale(1.07);
}

.product-content{
padding:20px;
text-align:center;
}

.price{
color:#c9a227;
font-weight:bold;
margin:10px 0;
}

.btn{
padding:12px 30px;
border:none;
border-radius:30px;
background:#c9a227;
color:#000;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
}

/* ===== Features ===== */

.features{
display:flex;
justify-content:space-around;
text-align:center;
padding:40px 0;
background:#0f0f0f;
flex-wrap:wrap;
}

.feature{
margin:15px;
color:#ccc;
}

/* ===== Footer ===== */

footer{
background:#000;
padding:40px;
text-align:center;
color:#888;
border-top:1px solid rgba(255,255,255,0.1);
}

/* ===== Responsive ===== */

@media(max-width:768px){
.hero h1{font-size:32px;}
.product img{height:450px;}
nav{padding:15px;}
}

</style>
</head>

<body>

<!-- ===== Navbar ===== -->

<nav>
<div class="logo">Aladdin Store</div>
<div class="nav-links">
<a href="#">الرئيسية</a>
<a href="#">المنتجات</a>
<a href="#">تواصل معنا</a>
</div>
</nav>

<!-- ===== Hero ===== -->

<div class="hero">
<h1>تجربة تسوق عصرية</h1>
<p>أفضل المنتجات بأفضل الأسعار</p>
<button onclick="document.querySelector('section').scrollIntoView({behavior:'smooth'})">
تصفح المنتجات
</button>
</div>

<!-- ===== Features ===== -->

<div class="features">
<div class="feature">🚚 توصيل لكل الولايات</div>
<div class="feature">💰 الدفع عند الاستلام</div>
<div class="feature">⭐ جودة مضمونة</div>
</div>

<!-- ===== Products ===== -->

<section>
<h2 class="section-title">منتجاتنا</h2>
<div class="products" id="productsContainer"></div>
</section>

<!-- ===== Footer ===== -->

<footer>
© 2026 Aladdin Store — جميع الحقوق محفوظة
</footer>

<script>

const formLink="https://docs.google.com/forms/d/e/1FAIpQLSfy-MjssJKiXWzQOaf0Oy2XLjvnUiV8QTsQsFZONPKPdOOz0g/viewform?usp=dialog";

const products=[

{
name:"Xiaomi Trottinette électrique Scooter 4 Lite (2nd Gen)",
price:"2500 دج",
image:"IMG_9737.jpeg"
},

{
name:"منتج رقم 2",
price:"2500 دج",
image:"IMG_9737.jpeg"
},

{
name:"منتج رقم 3",
price:"2500 دج",
image:"IMG_9737.jpeg"
}

];

const container=document.getElementById("productsContainer");

products.forEach(product=>{

const div=document.createElement("div");
div.className="product";

div.innerHTML=`
<img src="${product.image}">
<div class="product-content">
<h3>${product.name}</h3>
<div class="price">${product.price}</div>
<button class="btn">اطلب الآن</button>
</div>
`;

div.querySelector(".btn").onclick=()=>{
window.open(formLink,"_blank");
};

container.appendChild(div);

});

</script>

</body>
</html>
